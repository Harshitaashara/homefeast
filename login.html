<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HomeFeast | Login & Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#198754,#4CAF50,#8BC34A);
}

.container-box{
    width:420px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    overflow:hidden;
}

.header{
    background:#198754;
    color:white;
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:32px;
    margin-bottom:5px;
}

.header p{
    font-size:14px;
}

.form-area{
    padding:30px;
}

h2{
    text-align:center;
    color:#ffaa4f;
    margin-bottom:25px;
}

.form-control{
    height:50px;
    border-radius:10px;
    margin-bottom:15px;
}

.btn-custom{
    width:100%;
    height:50px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    background:#ffaa4f;
    color:white;
    transition:.3s;
}

.btn-custom:hover{
    background:#ffaa4f;
}

.link{
    text-align:center;
    margin-top:20px;
}

.link a{
    text-decoration:none;
    color:#198754;
    font-weight:bold;
}

.link a:hover{
    color:#14532d;
}

.form-check{
    margin-bottom:15px;
}

#signup{
    display:none;
}

input:focus{
    box-shadow:none !important;
    border:2px solid #198754 !important;
}

@media(max-width:500px){

.container-box{
    width:95%;
}

}

</style>

</head>

<body>

<div class="container-box">

<div class="header">

<h1>🍱 HomeFeast</h1>

<p>Fresh Homemade Meals Delivered Daily</p>

</div>

<div class="form-area">

<!-- LOGIN -->

<div id="login">

<h2>Login</h2>

<form>

<input
type="email"
class="form-control"
placeholder="Email Address"
required>

<input
type="password"
id="loginPassword"
class="form-control"
placeholder="Password"
required>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
onclick="togglePassword('loginPassword')">

<label class="form-check-label">

Show Password

</label>

</div>

<button
type="submit"
class="btn-custom">

Login

</button>

</form>

<div class="link">

Don't have an account?

<a href="#" onclick="showSignup()">

Sign Up

</a>

</div>

</div>

<!-- SIGNUP -->

<div id="signup">

<h2>Create Account</h2>

<form>

<input
type="text"
class="form-control"
placeholder="Full Name"
required>

<input
type="email"
class="form-control"
placeholder="Email Address"
required>

<input
type="tel"
class="form-control"
placeholder="Mobile Number"
required>

<input
type="password"
id="signupPassword"
class="form-control"
placeholder="Password"
required>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
onclick="togglePassword('signupPassword')">

<label class="form-check-label">

Show Password

</label>

</div>

<button
type="submit"
class="btn-custom">

Create Account

</button>

</form>

<div class="link">

Already have an account?

<a href="#" onclick="showLogin()">

Login

</a>

</div>

</div>

</div>

</div>

<script>

function showSignup(){

document.getElementById("login").style.display="none";
document.getElementById("signup").style.display="block";

}

function showLogin(){

document.getElementById("signup").style.display="none";
document.getElementById("login").style.display="block";

}

function togglePassword(id){

const password=document.getElementById(id);

if(password.type==="password"){
password.type="text";
}
else{
password.type="password";
}

}

// Prevent page refresh for demo
document.querySelectorAll("form").forEach(form=>{
form.addEventListener("submit",function(e){
e.preventDefault();
alert("Feature will be connected to the backend later.");
});
});

</script>

</body>
</html>
