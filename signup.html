<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HomeFeast | Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#198754,#5cb85c);
}

.container-box{
width:450px;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
color:#198754;
font-weight:bold;
}

.logo p{
color:gray;
}

h2{
text-align:center;
margin-bottom:20px;
color:#ffaa4f;
}

.form-control{
height:48px;
margin-bottom:15px;
border-radius:10px;
}

.btn-register{
width:100%;
height:50px;
border:none;
background:#ffaa4f;
color:white;
font-size:18px;
font-weight:bold;
border-radius:10px;
transition:.3s;
}

.btn-register:hover{
background:#ffaa4f;
}

.login-link{
text-align:center;
margin-top:20px;
}

.login-link a{
text-decoration:none;
font-weight:bold;
color:#198754;
}

.login-link a:hover{
color:#145c32;
}

</style>

</head>

<body>

<div class="container-box">

<div class="logo">

<h1>🍱 HomeFeast</h1>

<p>Create your account</p>

</div>

<h2>Sign Up</h2>

<form id="signupForm">

<input
type="text"
class="form-control"
placeholder="Full Name"
required>

<input
type="email"
class="form-control"
placeholder="Email Address"
required>

<input
type="tel"
class="form-control"
placeholder="Mobile Number"
required>

<input
type="text"
class="form-control"
placeholder="City"
required>

<select class="form-control" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input
type="password"
id="password"
class="form-control"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm Password"
required>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
onclick="showPassword()">

<label class="form-check-label">

Show Password

</label>

</div>

<button
type="submit"
class="btn-register">

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<script>

function showPassword(){

let p=document.getElementById("password");
let cp=document.getElementById("confirmPassword");

if(p.type==="password"){

p.type="text";
cp.type="text";

}
else{

p.type="password";
cp.type="password";

}

}

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

let p=document.getElementById("password").value;
let cp=document.getElementById("confirmPassword").value;

if(p!==cp){

alert("Passwords do not match!");

return;

}

alert("Account Created Successfully!");

window.location.href="login.html";

});

</script>

</body>
</html>
